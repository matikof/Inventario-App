<div class="container text-center">

    <div>
        <h3>Agregar Producto</h3>
    </div>

    <!-- 1. Se asigna la referencia #productoForm -->
    <form #productoForm="ngForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <!-- 2. Se asegura de tener el atributo required (no es necesario el ="true") -->
            <input type="text" class="form-control" id="descripcion" name="descripcion" required
                   [(ngModel)]="producto.descripcion" #descripcionCtrl="ngModel">
            
            <!-- OPCIONAL: Muestra un mensaje de error si el campo está vacío y el usuario interactuó con él -->
            @if (descripcionCtrl.invalid && (descripcionCtrl.dirty || descripcionCtrl.touched)) {
                <div class="text-danger text-start mt-1">
                    La descripción es obligatoria.
                </div>
            }
        </div>

        <div class="mb-3">
            <label for="precio" class="form-label">Precio</label>
            <input type="number" step="any" class="form-control" id="precio" name="precio" required
                   [(ngModel)]="producto.precio">
        </div>

        <div class="mb-3">
            <label for="existencia" class="form-label">Existencia</label>
            <input type="number" class="form-control" id="existencia" name="existencia" required
                   [(ngModel)]="producto.existencia">
        </div>

        <!-- 3. El botón se deshabilita automáticamente si algún campo 'required' está vacío -->
        <button type="submit" class="btn btn-primary" [disabled]="productoForm.invalid">Submit</button>
    </form>

</div>
